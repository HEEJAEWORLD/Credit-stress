name: update-credit-data

on:
  schedule:
    # 월·수·금 22:00 UTC (미 증시 마감 후) · UTC 기준
    - cron: '0 22 * * 1,3,5'
  workflow_dispatch:        # 수동 실행 버튼 (첫 실행/테스트용)

permissions:
  contents: write

concurrency:
  group: update-credit-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install requests

      - name: Fetch data
        run: python fetch.py

      - name: Commit if changed
        run: |
          git config user.name  "credit-bot"
          git config user.email "credit-bot@users.noreplace.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "data: $(date -u +%Y-%m-%d) 자동 갱신"
            git push
          fi
